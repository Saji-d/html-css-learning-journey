<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>HTML & CSS Sandbox</title>
  </head>

  <body>
    <div class="container">
      <div class="card">
        <div class="card-text">
          <h2 class="red">Keep It Sporty</h2>
          <p>Shoes to keep you active</p>
          <a href="#" class="btn red-btn">View Collection</a>
        </div>
        <img src="images/sporty.png" alt="Sport Shoe" />
      </div>

      <div class="card">
        <div class="card-text">
          <h2 class="blue">Keep It Casual</h2>
          <p>Shoes to keep you comfortable</p>
          <a href="#" class="btn blue-btn">View Collection</a>
        </div>
        <img src="images/casual.png" alt="Casual Shoe" />
      </div>

      <div class="card">
        <div class="card-text">
          <h2 class="brown">Keep It Formal</h2>
          <p>Shoes to keep you looking sharp</p>
          <a href="#" class="btn brown-btn">View Collection</a>
        </div>
        <img src="images/formal.png" alt="Formal Shoe" />
      </div>
    </div>
  </body>
</html>
